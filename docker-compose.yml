services:
  notebane:
    build: .
    image: notebane:latest
    restart: unless-stopped
    env_file:
      - .env
    # Uncomment to expose Prometheus /metrics endpoint (set METRICS_PORT in .env too)
    # ports:
    #   - "9090:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource guardrails (adjust to your hardware)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
